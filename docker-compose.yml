version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: asmicrog_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-asmicrog_db}
      MYSQL_USER: ${DB_USER:-asmicrog_ashwik}
      MYSQL_PASSWORD: ${DB_PASSWORD:-*&^%$asMicroG$%^&*}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-GouthamAshwik09*&}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asmicrog_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asmicrog_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             gunicorn asmicrog.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asmicrog_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A asmicrog worker -l info --concurrency=4

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asmicrog_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - celery
    command: celery -A asmicrog beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asmicrog_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - celery
    command: celery -A asmicrog flower --port=5555

  user-frontend:
    build:
      context: ./frontend/users-asMicroG
      dockerfile: Dockerfile
    container_name: asmicrog_user_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./frontend/admin-asMicroG
      dockerfile: Dockerfile
    container_name: asmicrog_admin_frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: asmicrog_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - backend
      - user-frontend
      - admin-frontend

volumes:
  mysql_data:
  redis_data:
  media_data:
  static_data:
