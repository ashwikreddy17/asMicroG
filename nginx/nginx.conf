upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream user_frontend {
    server user-frontend:80;
}

upstream admin_frontend {
    server admin-frontend:80;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=10r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Admin panel — subdirectory routing
    location /panel/ {
        proxy_pass http://admin_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API routes → Django backend
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/(auth/token|auth/login|auth/register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django admin + static
    location /django-admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/django/ {
        proxy_pass http://backend;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        proxy_pass http://backend;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Flower task monitor (restrict to internal or VPN in prod)
    location /flower/ {
        proxy_pass http://flower:5555;
        proxy_set_header Host $host;
    }

    # User storefront — catch-all
    location / {
        proxy_pass http://user_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
